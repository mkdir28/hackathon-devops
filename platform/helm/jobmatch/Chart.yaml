apiVersion: v2
name: jobmatch
description: Umbrella Helm Chart for the Scout startup JobMatch platform
type: application
version: 1.0.1
appVersion: "1.0.0"

dependencies:
  - name: redis
    version: "18.1.5"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: qdrant
    version: "0.7.3"
    repository: "https://qdrant.github.io/qdrant-helm"
    condition: qdrant.enabled
