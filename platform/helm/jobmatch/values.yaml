# Global values for jobmatch umbrella chart
global:
  environment: dev

# API Service Configuration
api:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/dmzopi/jobmatch-api
    tag: v1.0.0-c001f8a-dev
    pullPolicy: IfNotPresent
  port: 3001
  resources: {}
  env:
    LLM_PROVIDER: "auto"
    SKILLS_DIR: "/app/skills"

# Web Service Configuration (Frontend)
web:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/dmzopi/jobmatch-web
    tag: v1.0.0-c001f8a-dev
    pullPolicy: IfNotPresent
  port: 80
  resources: {}

# Subchart: Redis Cache
redis:
  enabled: false
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: false

# Subchart: Qdrant Vector Database
qdrant:
  enabled: false
  persistence:
    enabled: false
