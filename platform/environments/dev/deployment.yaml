apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobmatch-api
  namespace: jobmatch-dev
  labels:
    app: jobmatch-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jobmatch-api
  template:
    metadata:
      labels:
        app: jobmatch-api
    spec:
      containers:
        - name: api
          image: ghcr.io/mkdir28/jobmatch-api:v1.0.0-dev # {"$imagepolicy": "flux-system:jobmatch-api-dev"}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: LLM_PROVIDER
              value: "auto"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-secrets
                  key: gemini-api-key
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-secrets
                  key: openai-api-key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-secrets
                  key: anthropic-api-key
                  optional: true
            - name: SKILLS_DIR
              value: "/app/skills"
          volumeMounts:
            - name: skills-volume
              mountPath: /app/skills
      volumes:
        - name: skills-volume
          configMap:
            name: jobmatch-skills
---
apiVersion: v1
kind: Service
metadata:
  name: jobmatch-api
  namespace: jobmatch-dev
spec:
  ports:
    - port: 3001
      targetPort: 3001
  selector:
    app: jobmatch-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobmatch-web
  namespace: jobmatch-dev
  labels:
    app: jobmatch-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jobmatch-web
  template:
    metadata:
      labels:
        app: jobmatch-web
    spec:
      containers:
        - name: web
          image: ghcr.io/mkdir28/jobmatch-web:v1.0.0-dev # {"$imagepolicy": "flux-system:jobmatch-web-dev"}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: jobmatch-web
  namespace: jobmatch-dev
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: jobmatch-web
