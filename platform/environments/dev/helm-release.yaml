apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jobmatch-dev
  namespace: jobmatch-dev
spec:
  interval: 5m
  chart:
    spec:
      chart: ./platform/helm/jobmatch
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    remediation:
      retries: 3
  values:
    global:
      environment: dev
    api:
      replicaCount: 1
      image:
        tag: v1.0.0-c001f8a-dev
    web:
      replicaCount: 1
      image:
        tag: v1.0.0-c001f8a-dev
