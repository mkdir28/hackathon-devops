apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobmatch-api
  namespace: jobmatch-prod
  labels:
    app: jobmatch-api
spec:
  replicas: 2
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  selector:
    matchLabels:
      app: jobmatch-api
  template:
    metadata:
      labels:
        app: jobmatch-api
    spec:
      containers:
        - name: api
          image: ghcr.io/mkdir28/jobmatch-api:v1.0.0 # {"$imagepolicy": "flux-system:jobmatch-api-prod"}
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: LLM_PROVIDER
              value: "auto"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-secrets
                  key: gemini-api-key
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-secrets
                  key: openai-api-key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-secrets
                  key: anthropic-api-key
                  optional: true
            - name: SKILLS_DIR
              value: "/app/skills"
---
apiVersion: v1
kind: Service
metadata:
  name: jobmatch-api
  namespace: jobmatch-prod
spec:
  ports:
    - port: 3001
      targetPort: 3001
  selector:
    app: jobmatch-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobmatch-web
  namespace: jobmatch-prod
  labels:
    app: jobmatch-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jobmatch-web
  template:
    metadata:
      labels:
        app: jobmatch-web
    spec:
      containers:
        - name: web
          image: ghcr.io/mkdir28/jobmatch-web:v1.0.0 # {"$imagepolicy": "flux-system:jobmatch-web-prod"}
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: jobmatch-web
  namespace: jobmatch-prod
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: jobmatch-web
