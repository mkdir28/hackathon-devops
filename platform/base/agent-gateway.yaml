apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-gateway
  namespace: scout-platform
  labels:
    app: agent-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-gateway
  template:
    metadata:
      labels:
        app: agent-gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/berriai/litellm:main-v1.35.20 
          ports:
            - containerPort: 8080
          env:
            - name: ENABLE_PROMPT_INJECTION_SHIELD
              value: "true"
            - name: ENABLE_PII_MASKING
              value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: agent-gateway
  namespace: scout-platform
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: agent-gateway