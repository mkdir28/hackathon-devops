apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: agent-skills-source
  namespace: flux-system
spec:
  interval: 1m # Перевіряти зміни в Git кожну хвилину
  url: https://github.com/mkdir28/hackathon-devops.git
  ref:
    branch: develop # Стежимо за гілкою розробки
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: agent-skills-deploy
  namespace: flux-system
spec:
  interval: 2m
  targetNamespace: scout-platform
  sourceRef:
    kind: GitRepository
    name: agent-skills-source
  path: "./app/agent-config" # folder for agent-skills config files 
  prune: true