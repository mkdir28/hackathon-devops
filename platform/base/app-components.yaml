apiVersion: apps/v1
kind: Deployment
metadata:
  name: scout-api
  namespace: scout-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scout-api
  template:
    metadata:
      labels:
        app: scout-api
    spec:
      containers:
        - name: api
          image: jobmatch-api-placeholder
          ports:
            - containerPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scout-web
  namespace: scout-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scout-web
  template:
    metadata:
      labels:
        app: scout-web
    spec:
      containers:
        - name: web
          image: jobmatch-web-placeholder
          ports:
            - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: api              
  namespace: scout-platform
spec:
  ports:
    - port: 8000         
      targetPort: 8000
  selector:
    app: scout-api      