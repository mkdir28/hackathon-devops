apiVersion: k3d.io/v1alpha5
   kind: Simple
   metadata:
     name: scout-cluster
   servers: 1
   agents: 2
   image: rancher/k3s:v1.31.1-k3s1
   ports:
     - port: 8080:80
       nodeFilters:
         - loadbalancer
     - port: 8443:443
       nodeFilters:
         - loadbalancer
   options:
     k3d:
       wait: true
       timeout: "5m0s"
     kubeconfig:
       updateDefaultKubeconfig: true
       switchCurrentContext: true