apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - agent-gateway.yaml
  - flux-system.yaml
  - agent-skills-sync.yaml
  - app-components.yaml
  - argocd-ingress.yaml

patches:
  - target:
      kind: Deployment
      name: argocd-server
      namespace: argocd
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args
        value: ["--insecure"]