apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-bootstrap
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./platform/flux/infra
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 2m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: jobmatch-app-bootstrap
  namespace: flux-system
spec:
  interval: 2m0s
  path: ./platform/flux/app/jobmatch
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 2m
