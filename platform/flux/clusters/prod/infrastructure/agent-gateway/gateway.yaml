apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: agent-gateway
  namespace: jobmatch-prod
spec:
  gatewayClassName: abox-gateway-class
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-route
  namespace: jobmatch-prod
spec:
  parentRefs:
  - name: agent-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api
    # Gateway filter integration for AI-content defend
    filters:
    - type: ExtensionRef
      extensionRef:
        group: gateway.abox.ai
        kind: PromptEnrichment
        name: system-prompt-protection
    backendRefs:
    - name: jobmatch-prod-api
      port: 3001
