apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-llm
  namespace: jobmatch-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-llm
  template:
    metadata:
      labels:
        app: mock-llm
    spec:
      containers:
        - name: mock-llm
          image: node:20-alpine
          command:
            - sh
            - -c
            - |
              node -e '
              const http = require("http");
              http.createServer((req, res) => {
                let body = "";
                req.on("data", chunk => body += chunk);
                req.on("end", () => {
                  console.log("=== RECEIVED MASKED REQUEST BODY ===\n" + body + "\n====================================");
                  res.writeHead(200, { "Content-Type": "application/json" });
                  res.end(JSON.stringify({
                    choices: [
                      {
                        message: {
                          role: "assistant",
                          content: JSON.stringify({ score: 5.0, explanation: "Check logs, masking works!", matchedJobs: [] })
                        }
                      }
                    ]
                  }));
                });
              }).listen(8089);
              '
          ports:
            - containerPort: 8089
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: mock-llm
  namespace: jobmatch-prod
spec:
  ports:
    - port: 8089
      targetPort: 8089
      name: http
  selector:
    app: mock-llm
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-gateway-to-mock-llm
  namespace: jobmatch-prod
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: agentgateway-system
  to:
    - group: ""
      kind: Service
      name: mock-llm

