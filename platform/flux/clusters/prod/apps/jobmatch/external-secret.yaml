apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: llm-secrets
  namespace: jobmatch-prod
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore

  target:
    name: llm-secrets
    creationPolicy: Owner

  data:
    - secretKey: gemini-api-key
      remoteRef:
        key: gemini-api-key                