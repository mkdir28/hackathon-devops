apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jobmatch-prod
  namespace: jobmatch-prod
spec:
  interval: 5m
  chart:
    spec:
      chart: ./platform/helm/jobmatch
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    remediation:
      retries: 3
  values:
    global:
      environment: prod
    api:
      replicaCount: 1
      image:
        tag: v1.0.0-b381b19
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    web:
      replicaCount: 1
      image:
        tag: v1.0.0-b381b19
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
