apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jobmatch-prod
  namespace: jobmatch-prod
spec:
  interval: 5m
  chart:
    spec:
      chart: ./platform/helm/jobmatch
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: ChartVersion
  install:
    remediation:
      retries: 3
  values:
    global:
      environment: prod
    api:
      replicaCount: 1
      image:
        repository: ghcr.io/mkdir28/jobmatch-api
        tag: "v1.0.0-8138241"
      env:
        LLM_PROVIDER: "auto"
    web:
      replicaCount: 1
      image:
        repository: ghcr.io/mkdir28/jobmatch-web
        tag: "v1.0.0-8138241"
    redis:
      enabled: true
      image:
        registry: docker.io
        repository: bitnami/redis
        tag: latest
    qdrant:
      enabled: true
