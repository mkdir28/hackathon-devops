apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: external-secrets
      version: "0.*"
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system

  targetNamespace: external-secrets

  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    installCRDs: true
    serviceAccount:
      annotations:
        iam.gke.io/gcp-service-account: "eso-sa@happy-deploys-job-searcher.iam.gserviceaccount.com"