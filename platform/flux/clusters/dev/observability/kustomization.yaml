apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - helm-repo.yaml
  - helm-release.yaml
  - loki.yaml
  - grafana-ingress.yaml
  - dashboard.json

configMapGenerator:
  - name: jobmatch-llm-dashboard
    namespace: jobmatch-dev
    files:
      - llm-monitoring.json=dashboard.json 
    options:
      labels:
        grafana_dashboard: "1"
generatorOptions:
  disableNameSuffixHash: true