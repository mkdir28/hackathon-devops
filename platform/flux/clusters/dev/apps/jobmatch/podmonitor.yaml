apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: agentgateway-external-monitor
  namespace: jobmatch-dev
spec:
  namespaceSelector:
    matchNames:
      - agentgateway-system
  selector:
    matchLabels:
      app.kubernetes.io/name: agentgateway-external
  podMetricsEndpoints:
  - port: metrics
    path: /stats/prometheus
    interval: 15s