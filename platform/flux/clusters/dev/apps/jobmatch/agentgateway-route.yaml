apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-router
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agentgateway-external
  rules:
    # 1. Simple matching tasks (job_match) -> cheap fast model (mirrored to mock-llm)
    - matches:
        - headers:
            - name: x-gateway-task-name
              value: "job_match"
      filters:
        - type: RequestMirror
          requestMirror:
            backendRef:
              group: ""
              kind: Service
              name: mock-llm
              namespace: jobmatch-dev
              port: 8089
      backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: llm-for-simple-task
          port: 443
    # 2. Complex tasks and by default -> expensive model (mirrored to mock-llm)
    - filters:
        - type: RequestMirror
          requestMirror:
            backendRef:
              group: ""
              kind: Service
              name: mock-llm
              namespace: jobmatch-dev
              port: 8089
      backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: llm-for-complex-task
          port: 443

