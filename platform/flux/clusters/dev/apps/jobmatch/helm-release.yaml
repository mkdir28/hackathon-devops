apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jobmatch-dev
  namespace: jobmatch-dev
spec:
  interval: 5m
  chart:
    spec:
      chart: ./platform/helm/jobmatch
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  install:
    remediation:
      retries: 3
  values:
    global:
      environment: stage
    api:
      replicaCount: 1
      image:
        repository: ghcr.io/mkdir28/jobmatch-api
        tag: "v1.0.0-93d0ee9"
      env:
        LLM_PROVIDER: "gemini"
        SKILLS_DIR: "/app/skills"
        DEBUG: "abox:*,kagent:*,ai:*"
# 1. Instead of real secretKeyRef, inserting fake token:
        GEMINI_API_KEY: "LOCAL_GATEWAY_MANAGED_TOKEN"
# 2. Forward SDK to local Agent Gateway port 3001: 
        GEMINI_API_BASE_URL: "http://agent-gateway.jobmatch-dev.svc.cluster.local:3001/v1alpha1"
    web:
      replicaCount: 1
      image:
        repository: ghcr.io/mkdir28/jobmatch-web
        tag: "v1.0.0-93d0ee9"
    redis:
      enabled: true
      image:
        registry: docker.io
        repository: bitnami/redis
        tag: latest
    qdrant:
      enabled: true
