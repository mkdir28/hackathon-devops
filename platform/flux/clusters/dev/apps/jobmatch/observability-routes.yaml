apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: observability-router
  namespace: jobmatch-dev
spec:
  parentRefs:
    - name: agentgateway-external
      namespace: agentgateway-system
  rules:
    # --- Grafana routes ---
    - matches:
        - path:
            type: PathPrefix
            value: /grafana
      backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80

    # --- Prometheus routes ---
    - matches:
        - path:
            type: PathPrefix
            value: /prometheus
      backendRefs:
        - name: kube-prometheus-stack-prometheus
          port: 9090