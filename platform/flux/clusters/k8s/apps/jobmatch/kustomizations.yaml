apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: jobmatch-dev
  namespace: flux-system
spec:
  interval: 2m0s
  path: ./platform/environments/dev
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 1m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: jobmatch-prod
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./platform/environments/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 2m
