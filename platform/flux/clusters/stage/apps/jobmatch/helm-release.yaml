apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jobmatch-stage
  namespace: jobmatch-stage
spec:
  interval: 5m
  chart:
    spec:
      chart: ./platform/helm/jobmatch
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  install:
    remediation:
      retries: 3
  values:
    global:
      environment: stage
    api:
      replicaCount: 1
      image:
        repository: ghcr.io/kylib4444/jobmatch-api
        tag: latest
    web:
      replicaCount: 1
      image:
        repository: ghcr.io/kylib4444/jobmatch-web
        tag: latest
    redis:
      enabled: true
    qdrant:
      enabled: true
