name: CI/CD Evals Quality Gate

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  run-evals:
    name: Run Evals & Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            app/server/package-lock.json

      - name: Install Workspace Dependencies
        run: |
          npm ci --prefix app
          npm ci --prefix app/server
          npm install --prefix evals

      - name: Run Linting
        run: |
          npm run lint --prefix app

      - name: Run Typecheck
        run: |
          npm run typecheck --prefix app

      - name: Compile Backend Server (Required for Evals)
        run: |
          npm run build:api --prefix app

      - name: Run Evals Quality Gate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          npm test --prefix evals
