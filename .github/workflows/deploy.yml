name: Build and Push Containers

on:
  push:
    branches:
      - dev
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Package Version
        id: version
        run: |
          VERSION=$(jq -r '.version' app/server/package.json)
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Get Short Git SHA
        id: sha
        run: |
          echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Determine Registry Tags
        id: config
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.short }}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          if [ "${{ github.ref_name }}" = "dev" ]; then
            WEB_TAGS="ghcr.io/$OWNER/jobmatch-web:$VERSION-$SHA-dev"
            API_TAGS="ghcr.io/$OWNER/jobmatch-api:$VERSION-$SHA-dev"
          else
            WEB_TAGS="ghcr.io/$OWNER/jobmatch-web:$VERSION-$SHA,ghcr.io/$OWNER/jobmatch-web:latest"
            API_TAGS="ghcr.io/$OWNER/jobmatch-api:$VERSION-$SHA,ghcr.io/$OWNER/jobmatch-api:latest"
          fi
          
          echo "web_tags=$WEB_TAGS" >> $GITHUB_OUTPUT
          echo "api_tags=$API_TAGS" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Frontend (Web)
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.config.outputs.web_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Backend (API)
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile.api
          push: true
          tags: ${{ steps.config.outputs.api_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
