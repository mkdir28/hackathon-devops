name: Build and Push Containers

on:
  push:
    branches:
      - dev
      - main

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync and Verify Skills (Prompts)
        run: |
          chmod +x scripts/sync-skills.sh
          ./scripts/sync-skills.sh
          if [ "${{ github.ref_name }}" != "dev" ]; then
            if [ -n "$(git status --porcelain platform/helm/jobmatch/skills)" ]; then
              echo "ERROR: platform/helm/jobmatch/skills is out of sync with app/skills. Please run ./scripts/sync-skills.sh locally and commit."
              exit 1
            fi
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            app/server/package-lock.json

      - name: Install Workspace Dependencies
        run: |
          npm ci --prefix app
          npm ci --prefix app/server
          npm install --prefix evals

      - name: Run Linting
        run: |
          npm run lint --prefix app

      - name: Run Typecheck
        run: |
          npm run typecheck --prefix app

      - name: Compile Backend Server (Required for Evals)
        run: |
          npm run build:api --prefix app

      - name: Run Evals Quality Gate
        run: |
          npm test --prefix evals

      - name: Extract Package Version
        id: version
        run: |
          VERSION=$(jq -r '.version' app/server/package.json)
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Get Short Git SHA
        id: sha
        run: |
          echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Determine Registry Tags
        id: config
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.short }}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          WEB_TAGS="ghcr.io/$OWNER/jobmatch-web:$VERSION-$SHA,ghcr.io/$OWNER/jobmatch-web:latest"
          API_TAGS="ghcr.io/$OWNER/jobmatch-api:$VERSION-$SHA,ghcr.io/$OWNER/jobmatch-api:latest"
          
          echo "web_tags=$WEB_TAGS" >> $GITHUB_OUTPUT
          echo "api_tags=$API_TAGS" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Frontend (Web)
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.config.outputs.web_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Backend (API)
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile.api
          push: true
          tags: ${{ steps.config.outputs.api_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Dev Config and Tag in Git
        if: github.ref_name == 'dev'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.short }}"
          TAG="$VERSION-$SHA"
          
          # Update tag in dev helm-release.yaml
          yq -i ".spec.values.api.image.tag = \"$TAG\"" platform/flux/clusters/dev/apps/jobmatch/helm-release.yaml
          yq -i ".spec.values.web.image.tag = \"$TAG\"" platform/flux/clusters/dev/apps/jobmatch/helm-release.yaml
          
          # Commit and push both prompts and tag if there are any changes
          if [ -n "$(git status --porcelain)" ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add platform/flux/clusters/dev/apps/jobmatch/helm-release.yaml platform/helm/jobmatch/skills/
            git commit -m "chore(gitops): auto-sync prompts and update dev image tag to $TAG [skip ci]"
            git push origin dev
          fi
