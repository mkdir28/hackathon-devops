apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-release-jobmatch-api
  namespace: default
  labels:
    helm.sh/chart: jobmatch-1.0.0
    app.kubernetes.io/name: jobmatch
    app.kubernetes.io/instance: my-release
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app: my-release-jobmatch-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jobmatch
      app.kubernetes.io/instance: my-release
      app: my-release-jobmatch-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jobmatch
        app.kubernetes.io/instance: my-release
        app: my-release-jobmatch-api
      annotations:
        checksum/config: 97992f09d7eae058d465c93e2d57fdba1994ed319ff0ba0b7b30ec3dcfd25674
    spec:
      containers:
        - name: api
          image: "ghcr.io/mkdir28/jobmatch-api:v1.0.0-dev"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: LLM_PROVIDER
              value: "auto"
            - name: SKILLS_DIR
              value: "/app/skills"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-secrets
                  key: gemini-api-key
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-secrets
                  key: openai-api-key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-secrets
                  key: anthropic-api-key
                  optional: true
          volumeMounts:
            - name: skills-volume
              mountPath: /app/skills
      volumes:
        - name: skills-volume
          configMap:
            name: my-release-jobmatch-skills
---
